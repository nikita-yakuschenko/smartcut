<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none">
  <defs>
    <linearGradient id="g1" x1="40" y1="40" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="g2" x1="78" y1="78" x2="282" y2="282" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="360" height="360" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Symbol -->
  <g filter="url(#shadow)">
    <rect x="40" y="40" width="280" height="280" rx="64" fill="white"/>
  </g>
  <rect x="40" y="40" width="280" height="280" rx="64" fill="url(#g1)"/>

  <!-- Long stock / bar -->
  <rect x="78" y="135" width="204" height="90" rx="28" fill="#F9FAFB" opacity="0.98"/>

  <!-- Measurement ticks -->
  <g opacity="0.92">
    <rect x="105" y="110" width="6" height="20" rx="3" fill="#E5E7EB"/>
    <rect x="132" y="98" width="6" height="32" rx="3" fill="#E5E7EB"/>
    <rect x="159" y="110" width="6" height="20" rx="3" fill="#E5E7EB"/>
    <rect x="186" y="98" width="6" height="32" rx="3" fill="#E5E7EB"/>
    <rect x="213" y="110" width="6" height="20" rx="3" fill="#E5E7EB"/>
    <rect x="240" y="98" width="6" height="32" rx="3" fill="#E5E7EB"/>
  </g>

  <!-- Cut lines / optimization marks -->
  <rect x="118" y="135" width="8" height="90" rx="4" fill="url(#g2)"/>
  <rect x="178" y="135" width="8" height="90" rx="4" fill="url(#g2)"/>
  <rect x="238" y="135" width="8" height="90" rx="4" fill="url(#g2)"/>

  <!-- Smart precision spark -->
  <path d="M256 82l7 15 15 7-15 7-7 15-7-15-15-7 15-7 7-15Z" fill="#F59E0B"/>

  <!-- Subtle diagonal cut cue -->
  <path d="M82 245l38-38" stroke="#F59E0B" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <path d="M142 245l38-38" stroke="#F59E0B" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

  <!-- Wordmark -->
  <g>
    <text x="380" y="150" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="-2">
      Smart<tspan fill="#D97706">Cut</tspan>
    </text>
    <text x="382" y="198" fill="#4B5563" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1.4">
      ЛИНЕЙНЫЙ РАСКРОЙ · ТОЧНЫЙ РАСЧЁТ · МИНИМУМ ЗАГОТОВОК
    </text>
    <text x="382" y="246" fill="#6B7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="400">
      Оптимизация раскроя стержней, труб, кабеля и профилей с учётом ширины реза
    </text>
  </g>
</svg>
